name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: npm ci
      - run: npm run build -w apps/desktop
      - name: Validate build constraints
        run: bash scripts/validate.sh
      - run: cargo build --release
        working-directory: apps/desktop/src-tauri
      - name: Create DMG
        run: |
          hdiutil create -volname "SDE Kit" -srcfolder apps/desktop/src-tauri/target/release/sde-kit -ov -format UDZO apps/desktop/src-tauri/target/release/SDE-Kit.dmg
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/sde-kit
            apps/desktop/src-tauri/target/release/SDE-Kit.dmg
          generate_release_notes: true
